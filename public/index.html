<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/x-icon" href="./assets/img/dieta-equilibrada-16x16.png" />
    <title> Asistente de Dietas Open AI </title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script type="module" src="./assets/js/main.js"> </script>

</head>

<body>

    <header class="layout__header-project">

        <h1 class="header__title-project">
            Desarrollo Web con IA
            <br>
            OpenAI - DeepSeek - JavaScript - NodeJS
        </h1>


    </header>

    <div class="layout__chat">


        <!--  ----  Header  -----   -->
        <header class="chat__header">

            <img 
                class="header__icon" 
                src="./assets/img/dieta-equilibrada-40x40.avif"
                alt="Ícono de Dieta Equilibrada" width="40" height="40"
            >

            <h2 class="header__title">
                Asistente - Dieta Semanal
            </h2>

        </header>


        <!--  ----  Main  -----   -->
        <main class="chat__main">

            <!--  -----  Mensajes del Chat  -----  -->
            <div class="chat__messages">
                <!--  *****  Cargar los Mensajes  *****  -->
            </div>

            <!--  -----  Inputs del Chat  -----  -->
            <div class="chat__input-group">

                <!--  -----  Input de Texto  -----  -->
                <input 
                    type="text" id="inputText" 
                    class="chat__input" 
                    placeholder="¿Te puedo ayudar con tu dieta de esta semana?"
                >

                <!--  -----  Botón de Respuesta  -----  -->
                <button class="chat__button" id="resButton"> 
                    Responder 
                </button>

            </div>

        </main>

    </div>

</body>

</html>
